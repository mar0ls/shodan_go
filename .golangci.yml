version: 2
run:
  timeout: 3m
linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - revive
    - unconvert
    - gocritic
    - gosec
    - nolintlint
  settings:
    gosec:
      # G705 (XSS via taint analysis) is a false positive for a CLI writing to os.Stdout/bytes.Buffer,
      # not to an HTTP ResponseWriter.
      excludes:
        - G705
    revive:
      severity: warning
    gocritic:
      enabled-checks:
        - appendAssign
        - boolExprSimplify
formatters:
  enable:
    - gofumpt
    - goimports
issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: "^generated_.*\\.go$"
      linters:
        - all
