name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and release binaries
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64  go build -ldflags="-s -w" -o dist/shodan-go-linux-amd64   .
          GOOS=linux   GOARCH=arm64  go build -ldflags="-s -w" -o dist/shodan-go-linux-arm64   .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-s -w" -o dist/shodan-go-macos-amd64  .
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-s -w" -o dist/shodan-go-macos-arm64  .
          GOOS=windows GOARCH=amd64  go build -ldflags="-s -w" -o dist/shodan-go-windows-amd64.exe .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
